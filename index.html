<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEO 구축 현황판</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f5f5f7;--bg2:#ffffff;--bg3:#f0f0f4;--bg4:#e8e8ef;
    --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
    --text:#1a1a2e;--text2:#4a4a6a;--text3:#9090aa;
    --accent:#5b4fff;--accent2:#7c6fff;
    --green:#0ea96e;--green-bg:rgba(14,169,110,0.08);
    --amber:#d97706;--amber-bg:rgba(217,119,6,0.08);
    --red:#dc2626;--red-bg:rgba(220,38,38,0.06);
    --blue:#2563eb;--blue-bg:rgba(37,99,235,0.08);
    --font:'Pretendard',-apple-system,sans-serif;
    --mono:'DM Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{background:var(--bg);color:var(--text);font-family:var(--font);}
  body{min-height:100vh;background:var(--bg);overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(124,111,255,0.03)1px,transparent 1px),linear-gradient(90deg,rgba(124,111,255,0.03)1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
  .wrap{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:0 32px 80px;}

  /* TOPBAR */
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:24px 0;margin-bottom:40px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:16px;}
  .brand-mark{display:flex;align-items:center;gap:12px;}
  .brand-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),#a599ff);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;color:white;flex-shrink:0;}
  .brand-title{font-size:16px;font-weight:600;letter-spacing:-0.3px;}
  .brand-sub{font-size:13px;color:var(--text3);font-family:var(--mono);margin-top:1px;}
  .topbar-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .sync-status{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text3);font-family:var(--mono);}
  .sync-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);transition:background 0.3s;}
  .sync-dot.live{background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);transition:all 0.15s;text-decoration:none;}
  .btn:hover{background:var(--bg4);color:var(--text);}

  /* METRICS */
  .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:36px;}
  .metric{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;position:relative;overflow:hidden;transition:border-color 0.2s;}
  .metric:hover{border-color:var(--border2);}
  .metric::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0.3;}
  .metric-label{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;}
  .metric-val{font-size:32px;font-weight:700;letter-spacing:-1px;color:var(--text);line-height:1;}
  .metric-sub{font-size:12px;color:var(--text3);margin-top:6px;font-family:var(--mono);}
  .metric-flag{font-size:18px;margin-bottom:8px;display:block;}

  /* TABS */
  .tabs{display:flex;gap:4px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:4px;margin-bottom:28px;flex-wrap:wrap;}
  .tab{padding:8px 18px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text3);transition:all 0.15s;}
  .tab:hover{color:var(--text2);}
  .tab.active{background:var(--bg4);color:var(--text);border:1px solid var(--border2);}
  .panel{display:none;}.panel.active{display:block;}

  /* COUNTRY GRID */
  .country-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;}
  .country-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:border-color 0.2s,transform 0.2s;}
  .country-card:hover{border-color:var(--border2);transform:translateY(-1px);}
  .country-header{padding:20px 20px 16px;display:flex;align-items:center;gap:12px;}
  .country-flag-big{font-size:28px;line-height:1;}
  .country-info{flex:1;}
  .country-name{font-size:16px;font-weight:600;}
  .country-platform{font-size:13px;color:var(--text3);font-family:var(--mono);margin-top:2px;}
  .country-pct{font-size:28px;font-weight:700;font-family:var(--mono);letter-spacing:-1px;}
  .progress-outer{height:3px;background:var(--bg4);margin:0 20px 16px;border-radius:99px;overflow:hidden;}
  .progress-inner{height:100%;border-radius:99px;transition:width 0.8s cubic-bezier(0.4,0,0.2,1);}
  .brand-rows{padding:0 20px 16px;}
  .brand-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:14px;}
  .brand-row:last-child{border-bottom:none;}
  .brand-row-name{color:var(--text2);}
  .brand-row-right{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:12px;color:var(--text3);}
  .status-pip{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;}
  .pip-done{background:var(--green);color:#fff;}
  .pip-partial{background:var(--amber-bg);color:var(--amber);}
  .pip-none{background:var(--bg4);color:var(--text3);}

  /* MATRIX */
  .matrix-wrap{border-radius:12px;border:1px solid var(--border);overflow:hidden;}
  .matrix-scroll{overflow-x:auto;max-height:70vh;overflow-y:auto;}
  .matrix-scroll table{border-collapse:separate;border-spacing:0;}
  .matrix-scroll thead th{position:sticky;top:0;z-index:10;background:var(--bg3);box-shadow:0 1px 0 var(--border);}
  table{width:100%;border-collapse:collapse;font-size:12px;}
  thead th{background:var(--bg3);padding:12px 14px;text-align:center;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap;font-size:13px;}
  thead th.task-col{text-align:left;min-width:160px;}
  thead th.country-group{border-left:1px solid var(--border2);font-size:12px;color:var(--text2);}
  tbody tr{transition:background 0.1s;}
  tbody tr:hover{background:rgba(255,255,255,0.02);}
  tbody td{padding:10px 14px;border-bottom:1px solid var(--border);text-align:center;vertical-align:middle;color:var(--text2);font-size:13px;}
  tbody td.task-col{text-align:left;color:var(--text);font-weight:500;}
  tbody td.country-start{border-left:1px solid var(--border2);}
  tbody tr:last-child td{border-bottom:none;}
  .cell-done{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:6px;background:var(--green);color:#fff;font-size:11px;font-weight:700;}
  .cell-partial{display:none;}
  .cell-none{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:6px;background:var(--bg4);color:var(--text3);font-size:11px;}

  /* TASKS */
  .task-list{display:flex;flex-direction:column;gap:8px;}
  .task-item{display:flex;align-items:flex-start;gap:20px;padding:20px 24px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;transition:border-color 0.15s,box-shadow 0.15s;}
  .task-item:hover{border-color:var(--border2);box-shadow:0 2px 8px rgba(0,0,0,0.06);}
  .task-num{font-size:13px;font-family:var(--mono);color:var(--text3);padding-top:3px;min-width:24px;font-weight:600;}
  .task-body{flex:1;}
  .task-name{font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px;}
  .task-detail{font-size:13px;color:var(--text2);line-height:1.7;}
  .tag{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;}
  .tag-dev{background:var(--blue-bg);color:var(--blue);border:1px solid rgba(37,99,235,0.15);}
  .tag-md{background:var(--green-bg);color:var(--green);border:1px solid rgba(14,169,110,0.15);}

  /* GEO */
  .notice{display:flex;align-items:center;gap:12px;padding:16px 20px;background:rgba(124,111,255,0.06);border:1px solid rgba(124,111,255,0.15);border-radius:12px;font-size:13px;color:var(--text2);margin-bottom:24px;line-height:1.6;}
  .notice-icon{font-size:16px;flex-shrink:0;padding-top:1px;}
  .notice a{color:var(--accent2);text-decoration:none;}
  .geo-input-row{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;}
  .geo-input-row input{flex:1;min-width:240px;padding:11px 16px;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-size:13px;font-family:var(--mono);outline:none;}
  .geo-input-row input:focus{border-color:var(--accent);}
  .geo-input-row input::placeholder{color:var(--text3);}
  .geo-input-row button{padding:11px 24px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:var(--accent);color:white;transition:all 0.15s;}
  .geo-input-row button:hover{background:var(--accent2);}
  .section-title{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--text2);}
  .history-list{display:flex;flex-direction:column;gap:0;}
  .history-item{display:flex;align-items:center;gap:16px;padding:16px 24px;background:var(--bg2);border:1px solid var(--border);border-radius:12px 12px 0 0;transition:border-color 0.15s;flex-wrap:wrap;}
  .history-item:hover{border-color:var(--border2);}
  .history-score{font-size:40px;font-weight:700;font-family:var(--mono);min-width:56px;line-height:1;}
  .score-a{color:var(--green);}.score-b{color:var(--blue);}.score-c{color:var(--amber);}.score-d{color:var(--red);}
  .history-info{flex:1;}
  .history-name{font-size:15px;font-weight:600;}
  .history-url{font-size:12px;color:var(--text3);font-family:var(--mono);margin-top:2px;}
  .history-date{font-size:12px;color:var(--text3);font-family:var(--mono);white-space:nowrap;}
  .history-grade{font-size:13px;font-weight:700;font-family:var(--mono);padding:4px 12px;border-radius:6px;}
  .grade-a{background:var(--green-bg);color:var(--green);}.grade-b{background:var(--blue-bg);color:var(--blue);}
  .grade-c{background:var(--amber-bg);color:var(--amber);}.grade-d{background:var(--red-bg);color:var(--red);}
  .score-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
  .score-bars{padding:20px 24px;display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .score-bar-header{display:flex;justify-content:space-between;font-size:13px;margin-bottom:8px;}
  .score-bar-label{color:var(--text3);}.score-bar-val{color:var(--text);font-weight:600;font-family:var(--mono);}
  .score-bar-track{height:4px;background:var(--bg4);border-radius:99px;overflow:hidden;}
  .score-bar-fill{height:100%;border-radius:99px;background:var(--accent);transition:width 1s ease;}
  .score-tags{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;}
  .score-tag{padding:5px 14px;border-radius:6px;font-size:12px;font-weight:600;background:var(--green-bg);color:var(--green);}
  .score-tag.warn{background:var(--amber-bg);color:var(--amber);}

  /* LEGEND */
  .legend{display:flex;gap:16px;font-size:13px;color:var(--text3);margin-bottom:14px;flex-wrap:wrap;}
  .legend-item{display:flex;align-items:center;gap:5px;}
  .ld{width:8px;height:8px;border-radius:50%;}

  /* STATE */
  .state-msg{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--text3);font-size:14px;gap:12px;text-align:center;}
  .state-msg .icon{font-size:32px;opacity:0.5;}
  .state-msg .desc{font-size:12px;line-height:1.7;max-width:360px;}
  .brand-sticky-row td{
    position:sticky;top:41px;z-index:1;
    background:var(--accent);
    color:#fff;
    font-size:14px;font-weight:700;
    letter-spacing:0;
    padding:8px 14px;
  }
  .spinner{width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  @media(max-width:640px){.wrap{padding:0 16px 60px;}.score-bars{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div class="brand-mark">
      <div class="brand-icon">&#10022;</div>
      <div>
        <div class="brand-title">GEO 구축 현황판</div>
        <div class="brand-sub">Generative Engine Optimization</div>
      </div>
    </div>
    <div class="topbar-right">
      <div class="sync-status">
        <div class="sync-dot" id="syncDot"></div>
        <span id="syncLabel">연결 중...</span>
      </div>
      <button class="btn" onclick="loadData()">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M10 6A4 4 0 1 1 6 2M10 2v3H7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        새로고침
      </button>
      <a class="btn" href="https://www.beusable.net/ko#geo" target="_blank">Beusable GEO &#8599;</a>

    </div>
  </div>

  <div class="metrics">
    <div class="metric" style="background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent; padding: 25px 20px;">
      <div class="metric-label" style="color:rgba(255,255,255,0.75);">전체 완료율</div>
      <div class="metric-sub" id="m-total-sub" style="color:rgba(255,255,255,0.65); margin-bottom: 10px;">불러오는 중...</div>
      <div class="metric-val" id="m-total" style="color:#fff">&#8212;</div>

    <div class="metric"><span class="metric-flag">&#127482;&#127480;</span><div class="metric-label">미국 &middot; 쇼피파이</div><div class="metric-val" id="m-us">&#8212;</div></div>
    <div class="metric"><span class="metric-flag">&#127481;&#127484;</span><div class="metric-label">대만 &middot; 카페24 / 숍라인</div><div class="metric-val" id="m-tw">&#8212;</div></div>
    <div class="metric"><span class="metric-flag">&#127471;&#127477;</span><div class="metric-label">일본 &middot; 카페24</div><div class="metric-val" id="m-jp">&#8212;</div></div>


  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('overview')">국가별 현황</button>
    <button class="tab" onclick="switchTab('matrix')">진행 현황</button>
    <button class="tab" onclick="switchTab('tasks')">작업 프로세스</button>
    <button class="tab" onclick="switchTab('geo')">GEO 점수</button>
  </div>

  <div class="panel active" id="panel-overview">

    <div class="country-grid" id="countryGrid">
      <div class="state-msg"><div class="spinner"></div><div>데이터를 불러오는 중...</div></div>
    </div>
  </div>

  <div class="panel" id="panel-matrix">
    <div class="matrix-wrap" id="matrixTable">
      <div class="state-msg"><div class="spinner"></div><div>데이터 로딩 중...</div></div>
    </div>
  </div>

  <div class="panel" id="panel-tasks">
    <div id="taskList"></div>
  </div>

  <div class="panel" id="panel-geo">

    <div class="section">
      <div class="section-title" style="margin-bottom:16px">진단 기록</div>
      <div id="geoFilterWrap"></div>
      <div class="history-list" id="geoHistory"></div>
    </div>
  </div>

</div>
<script>
// ==============================================
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz_l0C9na2VG69CxfaqvhhzqeUoEDZqzdpDdn1UGOpkSFZbRQg4wkC_Qr58yVWcyDFv/exec';

  {n:'2',name:'메타 데이터 설정',detail:'Meta title / Meta description 작성 후 카페24 SEO 설정에 직접 입력.',party:'md'},

function getStepStatus(val, date){
  // 날짜 컬럼에 값 있으면 완료
  const d = String(date||'').trim();
  const v = String(val||'').trim();
  if(d && d !== '-' && d !== '·') return 'done';
  if(v && v !== '-' && v !== '·') return 'done';
  return 'none';
}

function getStatus(v){
  if(!v||!v.trim())return'none';
  const t=v.trim(),u=t.toUpperCase();
  if(u==='O'||u==='✓'||u==='Y'||u==='YES')return'done';
  if(t.includes('구축중')||t.includes('진행')||t.includes('구축 중')||t.includes('홀딩')||t.includes('보류'))return'partial';
  if(t.length>0&&t!=='-'&&t!=='·')return'done';
  return'none';
}

async function fetchFromAppsScript(url){
  // Apps Script 웹앱은 fetch 시 302 리다이렉트를 하므로 no-cors 불가
  // no-redirect 없이 그냥 fetch하면 CORS 오류 — redirect:follow + mode:cors 필요
  // Apps Script 배포 설정: 액세스 권한 "모든 사용자" 필수
  const res = await fetch(url, {
    method: 'GET',
    redirect: 'follow',
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return await res.json();
}

async function loadData(){
  setSyncState('loading');setLoadingState();
  const isPlaceholder=APPS_SCRIPT_URL.includes('여기에_웹앱_URL_붙여넣기');
  if(isPlaceholder){setSyncState('error','URL 미설정');setErrorState('placeholder');return;}
  try{
    const res=await fetchFromAppsScript(APPS_SCRIPT_URL);
    if(res.status!=='ok')throw new Error(res.message||'시트 오류');
    processAndRender(res.data);
    setSyncState('live');
  }catch(e){
    console.error(e);setSyncState('error',e.message.slice(0,40));setErrorState(e.message);
  }
}

function parseDevSheet(allData){
  const sheet = allData['GEO 프로세스_파트별 분담'] || 
                allData['[GEO] 프로세스_파트별 분담'] || [];
  
  // 실제 태스크명 (엑셀 기준)
  const DEV_TASKS = ['H1 / H2 태그', '통합 스키마 설정 점검'];
  const result = {};
  BRANDS.forEach(b => { result[b] = {}; DEV_TASKS.forEach(t => { result[b][t] = 'none'; }); });

  // 헤더 찾기: 풀리 + 에이페 + 적용 날짜 가 같은 행에
  let hIdx = -1;
  for(let i = 0; i < sheet.length; i++){
    const j = sheet[i].join(',');
    if(j.includes('풀리') && j.includes('에이페') && j.includes('적용 날짜')){
      hIdx = i; break;
    }
  }
  if(hIdx < 0) return result;

  // 데이터는 hIdx+1부터
  // 국내 브랜드 날짜 컬럼: 풀리=7, 푸드올로지=9, 95P=11, 오브제=13, 8APM=15, 에이페=17, 듀오렉신=19
  const dateCols = [7, 9, 11, 13, 15, 17, 19];

  for(let i = hIdx + 1; i < sheet.length; i++){
    const row = sheet[i];
    const task = String(row[2] || '').trim();
    if(!task) continue;
    
    // 태스크명 매칭 (부분 일치 허용)
    const matchedTask = DEV_TASKS.find(t => task.includes(t) || t.includes(task));
    if(!matchedTask) continue;

    BRANDS.forEach((b, bi) => {
      const dateVal = String(row[dateCols[bi]] || '').trim();
      if(dateVal && dateVal !== '-' && dateVal !== '·') {
        result[b][matchedTask] = 'done';
      }
    });
  }
  return result;
}

function processAndRender(allData){
  const brandSheet=allData['GEO 진행 상황']||allData['브랜드별 진행 상황']||[];
  const devData=parseDevSheet(allData);
  const countryData={국내:[],대만:[],일본:[],미국:[]};
  let currentCountry=null;

  brandSheet.forEach(row=>{
    const col0=String(row[0]||'').trim();
    if(col0.includes('(국내)')){currentCountry='국내';return;}
    if(col0.includes('(대만)')){currentCountry='대만';return;}
    if(col0.includes('(일본)')){currentCountry='일본';return;}
    if(col0.includes('(미국)')){currentCountry='미국';return;}
    if(col0==='브랜드'||!col0||!currentCountry)return;
    const product=String(row[1]||'').trim();
    const link=String(row[2]||'').trim();
    if(!product) return;
    const brandMap={'95PROBLEM':'95P'};
    const normalBrand=brandMap[col0]||BRANDS.find(b=>col0===b||col0.includes(b))||col0;
    if(!BRANDS.includes(normalBrand))return;
    const s1=getStepStatus(row[6],row[7]);
    const s2=getStepStatus(row[8],row[9]);
    const s3=getStepStatus(row[10],row[11]);
    const devSteps=[devData[normalBrand]?.['H1 / H2 태그']||'none', devData[normalBrand]?.['통합 스키마 설정 점검']||'none'];
    countryData[currentCountry].push({brand:normalBrand,product,link,steps:[s1,s2,s3],devSteps,stepVals:[String(row[6]||''),String(row[8]||''),String(row[10]||'')]});
  });

  const progress=COUNTRIES.map(c=>{
    const items=countryData[c.name]||[];
    let total=0,done=0,partial=0;
    const brandStats={};
    BRANDS.forEach(b=>{brandStats[b]={done:0,partial:0,total:0};});
    items.forEach(item=>{
      item.steps.forEach(s=>{
        total++;
        if(!brandStats[item.brand])brandStats[item.brand]={done:0,partial:0,total:0};
        brandStats[item.brand].total++;
        if(s==='done'){done++;brandStats[item.brand].done++;}
        else if(s==='partial'){partial+=0.5;brandStats[item.brand].partial+=0.5;}
      });
    });
    const pct=total>0?Math.round((done+partial)/total*100):0;
    return{...c,pct,done,partial,total,brandStats,items};
  });

  let allDone=0,allTotal=0;
  progress.forEach(p=>{allDone+=p.done;allTotal+=p.total;});
  const totalPct=allTotal>0?Math.round(allDone/allTotal*100):0;
  document.getElementById('m-total').textContent=totalPct+'%';
  document.getElementById('m-total-sub').textContent=Math.round(allDone)+' / '+allTotal+' 완료';
  progress.forEach(p=>{const el=document.getElementById(p.metricId);if(el)el.textContent=p.pct+'%';});
  renderOverview(progress);
  renderBrandMatrix(progress);
  parseGeoScores(allData);
}

function parseGeoScores(allData){
  const sheet = allData['GEO 진행 상황'] || allData['브랜드별 진행 상황'] || [];
  const brandMap = {'95PROBLEM':'95P'};
  const scores = [];

  sheet.forEach(row => {
    const brand = String(row[0]||'').trim();
    const product = String(row[1]||'').trim();
    const link = String(row[2]||'').trim();
    const scoreVal = String(row[10]||'').trim();
    const dateVal = String(row[11]||'').trim();

    if(!brand||!product||!scoreVal) return;
    if(product.includes('★')||product.includes('초특가')) return;
    const score = parseInt(scoreVal);
    if(isNaN(score)||score<50||score>100) return;

    const normalBrand = brandMap[brand]||(BRANDS.find(b=>brand===b||brand.includes(b))||brand);
    if(!BRANDS.includes(normalBrand)) return;

    // 등급 계산
    const grade = score>=90?'A':score>=80?'B':score>=70?'C':'D';

    // 날짜 포맷 정리
    let date = dateVal;
    if(date && /^\d{4}-\d{2}-\d{2}/.test(date)) date = date.split('T')[0];

    // url 생성
    const urlObj = link ? (()=>{try{return new URL(link);}catch(e){return null;}})() : null;
    const url = urlObj ? urlObj.hostname.replace('www.','') + ' · consumer · detail' : '';

    // PDF 기반 세부 데이터 매핑
    const pdfData = GEO_PDF_DATA[normalBrand+':'+product.trim()] || GEO_PDF_DATA[normalBrand+':'+product.trim().replace(/ /g,'_')] || {};
    scores.push({score, grade, brand:normalBrand, product:product.trim(), url, date,
      items: pdfData.items||[],
      strengths: pdfData.strengths||[],
      warnings: pdfData.warnings||[]
    });
  });

  // 점수 높은 순 정렬
  scores.sort((a,b)=>b.score-a.score);

  // GEO_HISTORY 업데이트 후 렌더
  GEO_HISTORY.length = 0;
  scores.forEach(s => GEO_HISTORY.push(s));
  renderGeoFilter();
  renderGeoHistory();
}

function renderOverview(progress){
  document.getElementById('countryGrid').innerHTML=progress.map(c=>{
    const items=c.items||[];
    const brandDone={};
    BRANDS.forEach(b=>{
      const bi=items.filter(i=>i.brand===b);
      const total=bi.length*4;
      const done=bi.reduce((s,i)=>s+i.steps.filter(x=>x==='done').length,0);
      const partial=bi.reduce((s,i)=>s+i.steps.filter(x=>x==='partial').length,0);
      brandDone[b]={done,partial,total};
    });
    const cBrands=COUNTRY_BRANDS[c.name]||BRANDS;
    return`<div class="country-card">
      <div class="country-header">
        <div class="country-flag-big">${c.flag}</div>
        <div class="country-info"><div class="country-name">${c.name}</div><div class="country-platform">${c.platform}</div></div>
        <div class="country-pct" style="color:${c.color}">${c.pct}%</div>
      </div>
      <div class="progress-outer"><div class="progress-inner" style="width:${c.pct}%;background:${c.color}"></div></div>
      <div class="brand-rows">
        ${cBrands.map(b=>{
          const bd=brandDone[b]||{done:0,partial:0,total:0};
          const allD=bd.total>0&&bd.done===bd.total;
          const part=!allD&&(bd.done>0||bd.partial>0);
          const pip=allD?'pip-done':'pip-none';
          const lbl=allD?'✓':'·';
          const prodCount=((c.items||[]).filter(i=>i.brand===b)).length;
          return`<div class="brand-row">
            <span class="brand-row-name">${b}</span>
            <div class="brand-row-right">
              <span>${prodCount}개 상품</span>
              <div class="status-pip ${pip}">${lbl}</div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

  const tabHtml=countries.map(c=>`
    <button onclick="switchMatrixTab('${c.name}')" id="mtab-${c.name}"
      style="padding:6px 14px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:${c.name===activeCountry?'var(--bg4)':'transparent'};color:${c.name===activeCountry?'var(--text)':'var(--text3)'};transition:all 0.15s;margin-right:4px">
      ${c.flag} ${c.name}
    </button>`).join('');

  wrap.innerHTML=`
    <div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;gap:4px;flex-wrap:wrap">
      ${tabHtml}
    </div>
    <div id="matrix-body">${renderTable(activeCountry)}</div>`;

  window.switchMatrixTab=function(name){
    activeCountry=name;
    document.getElementById('matrix-body').innerHTML=renderTable(name);
    countries.forEach(c=>{
      const btn=document.getElementById('mtab-'+c.name);
      if(!btn)return;
      btn.style.background=c.name===name?'var(--bg4)':'transparent';
      btn.style.color=c.name===name?'var(--text)':'var(--text3)';
      btn.style.borderColor=c.name===name?'var(--border2)':'var(--border)';
    });
  };
}

function renderTasks(){
  document.getElementById('taskList').innerHTML=[
    {section:'MD 세팅 필요 건',tasks:TASKS_MD},
    {section:'개발파트 세팅 필요 건',tasks:TASKS_DEV}
  ].map(sec=>`
    <div style="margin-bottom:28px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
        <div style="font-size:14px;font-weight:700;color:var(--text);letter-spacing:-0.2px">${sec.section}</div>
        <div style="flex:1;height:1px;background:var(--border)"></div>
      </div>
      <div class="task-list">
        ${sec.tasks.map(t=>`<div class="task-item"><div class="task-num">${t.n}</div><div class="task-body"><div class="task-name">${t.name}</div><div class="task-detail">${t.detail}</div></div><span class="tag ${t.party==='dev'?'tag-dev':'tag-md'}">${t.party==='dev'?'개발':'MD'}</span></div>`).join('')}
      </div>
    </div>`).join('');
}

let geoFilterBrands=new Set();

function renderGeoFilter(){
  const brands=[...new Set(GEO_HISTORY.map(h=>h.brand))];
  const wrap=document.getElementById('geoFilterWrap');
  if(!wrap)return;
  wrap.innerHTML=`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;align-items:center">
    <button onclick="clearGeoFilter()" id="gf-all" style="padding:4px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:var(--accent);color:#fff;transition:all .15s">전체</button>
    ${brands.map(b=>`<button onclick="toggleGeoFilter('${b}')" id="gf-${b}"
      style="padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);transition:all .15s"
      >${b}</button>`).join('')}
  </div>`;
}

function toggleGeoFilter(brand){
  if(geoFilterBrands.has(brand))geoFilterBrands.delete(brand);
  else geoFilterBrands.add(brand);
  updateGeoFilterUI();
  renderGeoHistory();
}

function clearGeoFilter(){
  geoFilterBrands.clear();
  updateGeoFilterUI();
  renderGeoHistory();
}

function updateGeoFilterUI(){
  const brands=[...new Set(GEO_HISTORY.map(h=>h.brand))];
  // 전체 버튼
  const allBtn=document.getElementById('gf-all');
  if(allBtn){
    const isAll=geoFilterBrands.size===0;
    allBtn.style.background=isAll?'var(--accent)':'var(--bg3)';
    allBtn.style.color=isAll?'#fff':'var(--text2)';
    allBtn.style.borderColor=isAll?'var(--accent)':'var(--border2)';
  }
  brands.forEach(b=>{
    const btn=document.getElementById('gf-'+b);
    if(!btn)return;
    const active=geoFilterBrands.has(b);
    btn.style.background=active?'var(--accent)':'var(--bg3)';
    btn.style.color=active?'white':'var(--text2)';
    btn.style.borderColor=active?'var(--accent)':'var(--border2)';
  });
}

function renderGeoHistory(){
  const el=document.getElementById('geoHistory');
  const filtered=geoFilterBrands.size>0?GEO_HISTORY.filter(h=>geoFilterBrands.has(h.brand)):GEO_HISTORY;
  if(!filtered.length){
    el.innerHTML='<div class="state-msg"><div class="icon">📋</div><div>해당 브랜드의 진단 기록이 없습니다</div></div>';
    return;
  }
  el.innerHTML=filtered.map((h,i)=>{
    const gc=h.grade.toLowerCase();
    return`<div class="history-item">
      <div class="history-score score-${gc}">${h.score}</div>
      <div class="history-info"><div class="history-name">${h.brand} · ${h.product}</div><div class="history-url">${h.url}</div></div>
      <span class="history-grade grade-${gc}">${h.grade}등급</span>
      <div class="history-date">${h.date}</div>
    </div>
    ${h.items?`<div class="score-card" style="margin-top:0;margin-bottom:16px;border-top:none;border-top-left-radius:0;border-top-right-radius:0;">
      <div class="score-bars">${h.items.map(([k,v,pct])=>`<div><div class="score-bar-header"><span class="score-bar-label">${k}</span><span class="score-bar-val">${v}</span></div><div class="score-bar-track"><div class="score-bar-fill" style="width:${pct}%"></div></div></div>`).join('')}</div>
      <div class="score-tags">${h.strengths.map(s=>`<span class="score-tag">✓ ${s}</span>`).join('')}${h.warnings.map(w=>`<span class="score-tag warn">⚠ ${w}</span>`).join('')}</div>
    </div>`:''}`;
  }).join('');
}

function openBeusable(){window.open('https://www.beusable.net/ko#geo','_blank');}

function setSyncState(s,msg){
  const dot=document.getElementById('syncDot'),lbl=document.getElementById('syncLabel');
  dot.className='sync-dot';
  if(s==='live'){dot.classList.add('live');lbl.textContent='업데이트: '+new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});}
  else if(s==='loading'){lbl.textContent='불러오는 중...';}
  else{lbl.textContent=msg||'연결 실패';}
}

function setLoadingState(){
  const s='<div class="state-msg"><div class="spinner"></div><div>데이터를 불러오는 중...</div></div>';
  document.getElementById('countryGrid').innerHTML=s;
  document.getElementById('matrixTable').innerHTML=s;
}

function setErrorState(msg){
  const isP=msg==='placeholder';
  const html=isP
    ?`<div class="state-msg"><div class="icon" style="font-size:28px">🔧</div><div style="font-size:15px;font-weight:600;color:var(--text)">Apps Script URL을 설정해 주세요</div><div class="desc">index.html 상단의 <code style="color:var(--accent2)">APPS_SCRIPT_URL</code> 값을 교체하세요.</div></div>`
    :`<div class="state-msg"><div class="icon">⚠</div><div>${msg}</div></div>`;
  document.getElementById('countryGrid').innerHTML=html;
  document.getElementById('matrixTable').innerHTML=html;
}

function switchTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelector(`[onclick="switchTab('${name}')"]`).classList.add('active');
  document.getElementById('panel-'+name).classList.add('active');
}

renderTasks();
renderGeoFilter();
renderGeoHistory();
loadData();
</script>
</body>
</html>
